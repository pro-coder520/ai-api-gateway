version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gateway_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gateway} -d ${POSTGRES_DB:-ai_gateway}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-gateway}:${POSTGRES_PASSWORD:-gateway_secret}@postgres:5432/${POSTGRES_DB:-ai_gateway}"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./gateway:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  admin:
    build:
      context: ./admin_portal
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-8001}:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-gateway}:${POSTGRES_PASSWORD:-gateway_secret}@postgres:5432/${POSTGRES_DB:-ai_gateway}"
      REDIS_URL: "redis://redis:6379/1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./admin_portal:/app
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn admin_portal.wsgi:application
             --bind 0.0.0.0:8001
             --workers 3
             --timeout 120"

volumes:
  pgdata:
  redisdata:
